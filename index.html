<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>杜克的个人主页</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                "Microsoft YaHei",
                sans-serif;

            background: linear-gradient(
                135deg,
                #141e30,
                #243b55
            );

            color: white;
        }

        .card {
            width: min(90%, 700px);
            padding: 50px;
            text-align: center;

            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 16px;
            font-size: 42px;
        }

        p {
            color: #d7e0ea;
            line-height: 1.8;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;

            border-radius: 10px;

            background: white;
            color: #243b55;

            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>你好，我是杜克</h1>

        <p>
            这里是我的个人主页。
            我是一名计算机专业学生，
            正在学习游戏开发、C++、机器人视觉与人工智能。
        </p>

        <a href="https://github.com/" target="_blank">
            查看我的 GitHub
        </a>
    </main>
</body>
</html>
